<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
    <h1>Digital Complaint Box for A C Patil Students</h1>
    <p>Please share your concerns below.</p>
    
    <form>
        <label>Your Name:</label><br>
        <input type="text" placeholder="Optional"><br><br>

        <label>Complaint Category:</label><br>
        <select>
            <option>Student</option>
            <option>Non-Teaching Staff</option>
            <option>Teaching Staff</option>
        </select><br><br>

        <label>Details:</label><br>
        <textarea rows="5" placeholder="Describe the issue..."></textarea><br><br>

        <button type="submit">Submit Complaint</button>
    </form>
</div>
</body>
</html>
